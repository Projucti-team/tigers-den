name: Scrape Bangladesh cricket news

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Fetch Bangladesh cricket news
        run: npm run scrape:bangladesh-news
        continue-on-error: true

      - name: Commit updated news cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bangladesh-cricket-news.json
          if git diff --staged --quiet; then
            echo "No news cache changes."
          else
            git commit -m "chore: update Bangladesh cricket news cache"
            git push
          fi
