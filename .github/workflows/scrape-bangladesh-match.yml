name: Scrape Bangladesh last match

on:
  schedule:
    # 21:30 UTC daily (≈ 3:30 AM Bangladesh)
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Fetch last Bangladesh match
        env:
          CRICKET_DATA_API_KEY: ${{ secrets.CRICKET_DATA_API_KEY }}
        run: npm run scrape:bangladesh-match
        continue-on-error: true

      - name: Commit updated match cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bangladesh-last-match.json
          if git diff --staged --quiet; then
            echo "No match cache changes."
          else
            git commit -m "chore: update Bangladesh last match cache"
            git push
          fi
