# Optional: Postgres alongside the app (manual Docker deploy).
# Usage:
#   cp .env.production.example .env.production
#   # Set POSTGRES_URL=postgresql://tigersden:tigersden@postgres:5432/tigersden
#   # Unset DATABASE_URI (or remove the file: line)
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# First deploy on an empty DB: bootstrap runs migrations via entrypoint.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tigersden
      POSTGRES_PASSWORD: tigersden
      POSTGRES_DB: tigersden
    volumes:
      - tigersden-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tigersden -d tigersden"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://tigersden:tigersden@postgres:5432/tigersden
      DATABASE_URI: ""

volumes:
  tigersden-postgres:
